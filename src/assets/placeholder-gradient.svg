<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Base radial gradients to simulate mesh -->
    <radialGradient id="g1" cx="15%" cy="75%" r="60%">
      <stop offset="0%" stop-color="#3B4FD8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3B4FD8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g2" cx="80%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g3" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#C026D3" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g4" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g5" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#E040FB" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E040FB" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise filter for texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="soft-light" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background base color -->
  <rect width="400" height="400" fill="#5B21B6"/>

  <!-- Layered radial blobs -->
  <rect width="400" height="400" fill="url(#g1)"/>
  <rect width="400" height="400" fill="url(#g2)"/>
  <rect width="400" height="400" fill="url(#g3)"/>
  <rect width="400" height="400" fill="url(#g4)"/>
  <rect width="400" height="400" fill="url(#g5)"/>

  <!-- Noise texture overlay for grain -->
  <rect width="400" height="400" fill="transparent" filter="url(#noise)" opacity="0.18"/>
</svg>
